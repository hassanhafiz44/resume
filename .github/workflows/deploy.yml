name: Test, Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

  deploy:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /var/www/resume
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: cd /var/www/resume && bun install --frozen-lockfile --production

      - name: Build client
        run: cd /var/www/resume && bun build src/client/main.tsx --outdir public/dist --target browser --minify

      - name: Restart service
        run: sudo systemctl restart resume
